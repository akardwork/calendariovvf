name: Push Worker (INGV → FCM)

on:
  schedule:
    # Ogni 5 minuti. GitHub Actions non garantisce esattezza al minuto
    # ma in pratica il delay è 1-3 min. Per terremoti è OK.
    - cron: '*/5 * * * *'
  workflow_dispatch: # consente avvio manuale dalla UI di GitHub

concurrency:
  group: push-worker
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-push/package.json

      - name: Install deps
        working-directory: backend-push
        run: npm install --omit=dev

      - name: Run worker
        working-directory: backend-push
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node worker.js
